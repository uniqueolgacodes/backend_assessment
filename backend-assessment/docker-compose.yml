version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: assessment-postgres
    environment:
      POSTGRES_USER: assessment
      POSTGRES_PASSWORD: assessment123
      POSTGRES_DB: assessment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assessment -d assessment_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - assessment-network

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: assessment-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - assessment-network
    profiles:
      - tools

volumes:
  postgres_data:

networks:
  assessment-network:
    driver: bridge
